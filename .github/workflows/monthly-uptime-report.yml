name: Monthly Uptime Report

on:
  schedule:
    - cron: "0 8 1 * *"
  workflow_dispatch:

jobs:
  monthly-uptime-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Syntax check
        run: python -m py_compile scripts/monthly_uptime_report.py

      - name: Run monthly report unit tests
        run: python -m unittest tests.test_monthly_uptime_report -v

      - name: Send monthly report email
        env:
          UPTIMEROBOT_API_TOKEN: ${{ secrets.UPTIMEROBOT_API_TOKEN }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          REPORT_TO: ${{ secrets.REPORT_TO }}
        run: python scripts/monthly_uptime_report.py
